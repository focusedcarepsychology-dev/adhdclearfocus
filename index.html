function scoreResults(answers){
  const scores={};let asrsCount=0;let total=0;
  QS.forEach(q=>{
    const val=answers[q.id]??0;
    scores[q.d]=(scores[q.d]||0)+val;
    total+=val;
    if(q.asrs&&val>=2)asrsCount++;
  });
  const pcts={};
  Object.keys(DOMAINS).forEach(d=>{pcts[d]=Math.round(((scores[d]||0)/MAX_D[d])*100);});
  const asrsFlag=asrsCount>=4;
  const totalPct=Math.round((total/(QS.length*4))*100);
  let level,color;
  if(totalPct>=65||asrsFlag){level="Elevated";color=C.amber;}
  else if(totalPct>=40){level="Moderate";color=C.teal;}
  else{level="Low";color=C.green;}
  return{scores,pcts,asrsFlag,asrsCount,totalPct,level,color};
}

function getFoundingDaysLeft(){
  const close=new Date("2026-09-30");
  const diff=Math.ceil((close-new Date())/(1000*60*60*24));
  return Math.max(0,diff);
}

        placeholder:type==="complaint"?"Tell us what went wrong — we respond within 48 hours.":"Share your thoughts...",

    const clean=code.trim().toUpperCase();

      setAuthError('Code format: ACF-XXXXX-XXXX — check your report email');return;

  }

  const[resumeData,setResumeData]=useState(null);

  const currentQ=QS[qIndex];

  // Exit intent detection
  useEffect(()=>{
    function handleBeforeUnload(e){
      if(step==="questions"&&qIndex>3){
        e.preventDefault();
        e.returnValue="Your profile is "+progress+"% complete. Are you sure you want to leave?";
        return e.returnValue;
      }
    }
    window.addEventListener("beforeunload",handleBeforeUnload);
    return()=>window.removeEventListener("beforeunload",handleBeforeUnload);
  },[step,qIndex,progress]);

  // Resume detection on load
  useEffect(()=>{
    try{
      const saved=localStorage.getItem("acf_progress");
      if(saved){
        const{answers:a,qIndex:qi,isTeen:it}=JSON.parse(saved);
        if(a&&qi>0&&qi<QS.length){
          setResumeData({answers:a,qIndex:qi,isTeen:it||false});
          setShowResume(true);
        }
      }
    }catch(e){}
  },[]);
  const progress=Math.round((qIndex/QS.length)*100);
  const daysLeft=getFoundingDaysLeft();
  const domainKeys=Object.keys(DOMAINS);

  function tr(fn){
    setAnimIn(false);
    setTimeout(()=>{fn();setAnimIn(true);topRef.current?.scrollIntoView({behavior:"smooth"});},200);
  }

    const newA={...answers,[currentQ.id]:val};
    setAnswers(newA);
    // Save progress
    try{localStorage.setItem("acf_progress",JSON.stringify({answers:newA,qIndex:qIndex+1,isTeen}));}catch(e){}
    if(qIndex<QS.length-1){tr(()=>setQIndex(qIndex+1));}

      try{localStorage.removeItem("acf_progress");}catch(e){}
      const r=scoreResults(newA);setResult(r);if(navigator.vibrate)navigator.vibrate([100,50,100,50,200]);tr(()=>setStep("paywall"));
    }

          merge_fields:{ADHD_LEVEL:result?.level||"",ADHD_PCT:String(result?.totalPct||"")}})});
    }catch(e){console.log("Mailchimp:",e);}

    "spamgourmet.com","getairmail.com","fakeinbox.com","mailnull.com","spamspot.com"];

      setEmailError("Please enter a valid email address.");return;

                <div style={{fontWeight:900,fontSize:15,marginBottom:6}}>
                  Your 14-page PDF report is on its way
                </div>
                <div style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:12}}>
                  A personalised evidence-based report covering all 10 neurological dimensions
                  has been sent to your email.
                </div>
                <div style={{background:C.navy,border:`1px solid ${C.border}`,borderRadius:8,
                  padding:"8px 16px",display:"inline-block",fontSize:12,color:C.teal}}>
                  📧 Check your inbox
                </div>
              </div>


              {/* Loyalty discount — assessment completers */}
              <div style={{background:"linear-gradient(135deg,#0A2010,#0A1628)",
                border:`1px solid ${C.green}50`,borderRadius:16,padding:"20px",marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <div style={{fontSize:11,color:C.green,fontWeight:700,
                      textTransform:"uppercase",letterSpacing:1}}>
                      🎁 Assessment Completer Reward
                    </div>
                    <div style={{background:"#FF525220",border:"1px solid #FF525240",
                      borderRadius:99,padding:"2px 8px",fontSize:10,color:"#FF8080",fontWeight:700}}>
                      {daysLeft} days left · Founding rate
                    </div>
                  </div>
                    <div style={{fontSize:22,fontWeight:900,marginBottom:2}}>
                      €5<span style={{fontSize:12,fontWeight:400,color:C.muted}}>/month for life</span>
                    </div>
                    <div style={{fontSize:11,color:C.muted}}>Regular Pro price: €10/month · Your rate: locked forever</div>
                  </div>
                  <span style={{fontSize:24}}>🏷️</span>
                </div>
                <div style={{background:`${C.green}10`,border:`1px solid ${C.green}30`,
                  borderRadius:10,padding:"12px 16px",marginBottom:10,textAlign:"center"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Your lifetime discount code</div>
                  <div style={{fontSize:20,fontWeight:900,color:C.green,letterSpacing:4,fontFamily:"monospace"}}>
                    ACF-{email.split("@")[0].toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,6)||"EARLY"}-50
                  </div>
                  <div style={{fontSize:11,color:C.muted,marginTop:4}}>
                    Use this code when Pro launches to lock your €5/month rate permanently.
                    If you cancel and rejoin without the code, the rate will be €10/month.
                  </div>
                </div>
                <div style={{fontSize:12,color:C.muted,lineHeight:1.6}}>
                  This code is tied to your email address and valid for life. 
                  Save it now — it will also be included in your report email.
                </div>
              </div>

              {/* Pro CTA */}
              <FoundingCTA daysLeft={daysLeft} showDetail={showDetail}
                setShowDetail={setShowDetail} proEmail={proEmail}
                setProEmail={setProEmail} proJoined={proJoined} onJoin={handleProJoin}/>

              {/* Review call */}
              <div style={{background:"#1A0A35",border:"1px solid #A855F760",
                borderRadius:16,padding:"18px",marginBottom:16}}>
                <div style={{fontWeight:900,fontSize:14,marginBottom:6}}>
                  🎯 Want to go deeper with a specialist?
                </div>
                <div style={{color:C.muted,fontSize:13,lineHeight:1.65,marginBottom:12}}>
                  Book a 30-minute report review call with our clinical psychologist. Walk through
                  your 10-dimension profile, get specific answers to your questions, and leave
                  with a clear, personalised action plan.
                </div>
                <a href={STRIPE_LINKS.reviewCall} target="_blank" rel="noopener noreferrer"
                  style={{textDecoration:"none"}}>
                  <button style={{background:"#A855F7",color:C.white,border:"none",borderRadius:10,
                    padding:"12px 20px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                    Book 30-min Review Call — €79
                  </button>
                </a>
              </div>

              {/* Crisis */}
              <div style={{background:"#080F1A",border:`1px solid ${C.border}`,
                borderRadius:10,padding:"10px 14px",marginBottom:16,
                fontSize:11,color:C.muted,lineHeight:1.55}}>
                If you are experiencing distress or a mental health crisis:{" "}
                <strong style={{color:C.white}}>Samaritans 116 123</strong>
                {" "}(free, 24/7, Ireland & UK) or contact your GP.
              </div>

              {/* Share result */}
              <div style={{background:C.navyLight,border:`1px solid ${C.border}`,
                borderRadius:14,padding:"16px",marginBottom:12,textAlign:"center"}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>
                  📤 Share your profile
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.55}}>
                  Share your ADHD profile level — it might help someone you know recognise their own patterns.
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                  {[
                    {label:"Share on Twitter/X",icon:"🐦",
                      url:`https://twitter.com/intent/tweet?text=${encodeURIComponent(`I just completed the ADHDclearfocus 10-dimension ADHD profile — ${result.level} profile (${result.totalPct}%). If you've ever wondered about your own ADHD profile, try it: https://adhdclearfocus.com`)}`},
                    {label:"Share on WhatsApp",icon:"💬",
                      url:`https://wa.me/?text=${encodeURIComponent(`I just completed the ADHDclearfocus ADHD profile assessment — ${result.level} profile (${result.totalPct}% overall). It measures 10 neurological dimensions. Worth trying: https://adhdclearfocus.com`)}`},
                    {label:"Copy link",icon:"🔗",url:null},
                  ].map(s=>(
                    <button key={s.label} onClick={()=>{
                      if(s.url){window.open(s.url,"_blank");}
                      else{navigator.clipboard?.writeText("https://adhdclearfocus.com");
                        alert("Link copied!");}
                    }} style={{background:C.navyMid,border:`1px solid ${C.border}`,
                      color:C.white,borderRadius:8,padding:"8px 14px",fontSize:12,
                      cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                      <span>{s.icon}</span><span>{s.label}</span>
                    </button>
                  ))}
                </div>
              </div>

              <button onClick={restart}
                style={{background:"transparent",border:`1px solid ${C.border}`,
                  color:C.muted,borderRadius:10,padding:"11px",width:"100%",
                  cursor:"pointer",fontSize:13}}>
                ↺ Start a new assessment
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
,
    showAuthModal&&React.createElement(AuthModal,{
      mode:authMode,authEmail,setAuthEmail,authCode,setAuthCode,
      authError,onRegister:registerUser,onPro:activatePro,
      onClose:()=>{setShowAuthModal(false);setAuthError('');},
      daysLeft,C
    })
  );
}

// Auth modal render added at App level
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}</script>
</body>
</html>
